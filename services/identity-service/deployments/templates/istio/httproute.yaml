{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "identity-service.fullname" . }}-httproute
  labels:
    {{- include "identity-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: global-gateway
      namespace: istio-ingress
  hostnames:
{{- range .Values.httpRoute.hosts }}
    - {{ . | quote }}
{{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: {{ include "identity-service.fullname" . }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/jwks.json
      backendRefs:
        - name: {{ include "identity-service.fullname" . }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: {{ include "identity-service.fullname" . }}
          port: 8080
{{- end }}
