# docker-compose.test.yml
# Stack riêng cho E2E tests — không phụ thuộc vào external network hay production DB.
# Dùng: docker compose -f docker-compose.test.yml up -d --build --wait

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"   # tránh conflict với port 5432 local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d identity_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  identity-service-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TAGS: ""
    ports:
      - "8081:8080"
      - "50052:50051"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      GRPC_PORT: "50051"
      GIN_MODE: "test"
      DB_HOST: "postgres-test"
      DB_PORT: "5432"
      DB_USER: "test"
      DB_PASSWORD: "test"
      DB_NAME: "identity_test"
      DB_SSLMODE: "disable"
      REDIS_URL: "redis://redis-test:6379"
      JWT_ISSUER: "rent-a-girlfriend-identity"
      JWT_ACCESS_TTL_MINUTES: "15"
      JWT_REFRESH_TTL_DAYS: "7"
      KAFKA_BROKERS: "disabled"          # Kafka không cần thiết cho E2E test
      OUTBOX_POLLING_INTERVAL_MS: "500"
      ENABLE_TEST_ROUTES: "true" # Bật mock-login endpoint cho E2E
      # Google OAuth — giá trị giả, OAuth flow bị bypass qua mock-login
      GOOGLE_CLIENT_ID: "test-client-id"
      GOOGLE_CLIENT_SECRET: "test-client-secret"
      GOOGLE_REDIRECT_URI: "http://localhost:8081/api/v1/auth/google/callback"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  e2e-runner:
    image: golang:1.25-alpine
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      identity-service-test:
        condition: service_healthy
    environment:
      E2E_BASE_URL: "http://identity-service-test:8080"
    command: go test ./tests/e2e/... -v -count=1 -timeout 180s
