# 📋 NOTIFICATION TEMPLATES CONFIGURATION
# File này quản lý toàn bộ nội dung hiển thị của thông báo.
# Tham khảo: docs/event-integration-guide.md

events:
  # --- BOOKING EVENTS ---
  rentagf.booking.requested.v1:
    type: "TRANSACTIONAL"
    recipient_field: "companion_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Yêu cầu mới! 🔔"
        body: "Bạn có một yêu cầu đặt lịch mới từ khách hàng."
      en:
        title: "New Request! 🔔"
        body: "You have a new booking request from a client."

  rentagf.booking.accepted.v1:
    type: "TRANSACTIONAL"
    recipient_field: "client_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Yêu cầu được chấp nhận ✅"
        body: "Companion đã chấp nhận yêu cầu #{{booking_id}} của bạn."
      en:
        title: "Booking Accepted ✅"
        body: "Companion has accepted your booking request #{{booking_id}}."

  rentagf.booking.rejected.v1:
    type: "TRANSACTIONAL"
    recipient_field: "client_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Yêu cầu bị từ chối ❌"
        body: "Rất tiếc, yêu cầu đặt lịch #{{booking_id}} đã bị từ chối."
      en:
        title: "Booking Rejected ❌"
        body: "Sorry, your booking request #{{booking_id}} has been rejected."

  rentagf.booking.cancelled.v1:
    type: "TRANSACTIONAL"
    recipient_field: "_dynamic"  # Xác định bởi logic: đối phương của actor_role
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Lịch hẹn bị hủy ⚠️"
        body: "Lịch hẹn #{{booking_id}} đã bị hủy bởi {{actor_role}}."
      en:
        title: "Booking Cancelled ⚠️"
        body: "Booking #{{booking_id}} has been cancelled by {{actor_role}}."

  # --- FINANCE EVENTS ---
  rentagf.finance.topup.completed.v1:
    type: "TRANSACTIONAL"
    recipient_field: "user_id"
    priority: "MEDIUM"
    channels: ["SSE"]
    template:
      vi:
        title: "Nạp tiền thành công 💰"
        body: "Bạn vừa nạp thành công {{amount}} Kano-Coin."
      en:
        title: "Top-up Successful 💰"
        body: "You have successfully topped up {{amount}} Kano-Coin."

  rentagf.finance.payout.processed.v1:
    type: "TRANSACTIONAL"
    recipient_field: "companion_id"
    priority: "MEDIUM"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Thu nhập mới 💸"
        body: "Bạn đã nhận được thanh toán {{payout_amount}} Kano-Coin cho booking #{{booking_id}}."
      en:
        title: "New Income 💸"
        body: "You received {{payout_amount}} Kano-Coin for booking #{{booking_id}}."

  # --- INTERACTION EVENTS ---
  rentagf.chat.message.sent.v1:
    type: "INTERACTION"
    recipient_field: "recipient_id"
    priority: "MEDIUM"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Tin nhắn từ {{sender_name}}"
        body: "{{snippet}}"
      en:
        title: "Message from {{sender_name}}"
        body: "{{snippet}}"

  rentagf.interaction.review.submitted.v1:
    type: "INTERACTION"
    recipient_field: "companion_id"
    priority: "MEDIUM"
    channels: ["SSE"]
    template:
      vi:
        title: "Đánh giá mới! ⭐"
        body: "Bạn vừa nhận được đánh giá {{rating}}⭐ từ khách hàng."
      en:
        title: "New Review! ⭐"
        body: "You just received a {{rating}}⭐ review from a client."

  # --- PROFILE EVENTS ---
  rentagf.profile.companion.approved.v1:
    type: "PROMOTIONAL"
    recipient_field: "companion_id"
    priority: "LOW"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Chào mừng Companion! 🎉"
        body: "Hồ sơ của bạn đã được duyệt. Hãy bắt đầu nhận lịch ngay!"
      en:
        title: "Welcome Companion! 🎉"
        body: "Your profile has been approved. Start accepting bookings now!"

  rentagf.profile.companion.rejected.v1:
    type: "TRANSACTIONAL"
    recipient_field: "companion_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Hồ sơ bị từ chối 😔"
        body: "Rất tiếc, hồ sơ Companion của bạn chưa được duyệt. Lý do: {{reason}}."
      en:
        title: "Profile Rejected 😔"
        body: "Sorry, your Companion profile was not approved. Reason: {{reason}}."

  rentagf.profile.scenario.rejected.v1:
    type: "TRANSACTIONAL"
    recipient_field: "companion_id"
    priority: "MEDIUM"
    channels: ["SSE"]
    template:
      vi:
        title: "Kịch bản bị từ chối ❌"
        body: "Kịch bản của bạn đã bị từ chối. Lý do: {{reason}}."
      en:
        title: "Scenario Rejected ❌"
        body: "Your scenario has been rejected. Reason: {{reason}}."

  rentagf.profile.voice_intro.rejected.v1:
    type: "TRANSACTIONAL"
    recipient_field: "companion_id"
    priority: "MEDIUM"
    channels: ["SSE"]
    template:
      vi:
        title: "Voice Intro bị từ chối 🎤"
        body: "Giới thiệu giọng nói của bạn đã bị từ chối. Lý do: {{reason}}."
      en:
        title: "Voice Intro Rejected 🎤"
        body: "Your voice intro has been rejected. Reason: {{reason}}."

  rentagf.profile.album_image.rejected.v1:
    type: "TRANSACTIONAL"
    recipient_field: "companion_id"
    priority: "MEDIUM"
    channels: ["SSE"]
    template:
      vi:
        title: "Ảnh bị từ chối 📷"
        body: "Ảnh album của bạn đã bị từ chối. Lý do: {{reason}}."
      en:
        title: "Album Image Rejected 📷"
        body: "Your album image has been rejected. Reason: {{reason}}."

  # --- IDENTITY EVENTS ---
  rentagf.identity.upgrade.approved.v1:
    type: "TRANSACTIONAL"
    recipient_field: "user_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Nâng cấp thành công! 🚀"
        body: "Bạn đã được nâng cấp thành Companion. Hãy hoàn thiện hồ sơ ngay!"
      en:
        title: "Upgrade Approved! 🚀"
        body: "You have been upgraded to Companion. Complete your profile now!"

  rentagf.identity.upgrade.rejected.v1:
    type: "TRANSACTIONAL"
    recipient_field: "user_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Yêu cầu nâng cấp bị từ chối 😔"
        body: "Rất tiếc, yêu cầu nâng cấp Companion đã bị từ chối. Lý do: {{reason}}."
      en:
        title: "Upgrade Rejected 😔"
        body: "Sorry, your Companion upgrade request was rejected. Reason: {{reason}}."

  rentagf.identity.account.locked.v1:
    type: "TRANSACTIONAL"
    recipient_field: "user_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Tài khoản bị khóa 🔒"
        body: "Tài khoản của bạn đã bị khóa. Lý do: {{reason}}."
      en:
        title: "Account Locked 🔒"
        body: "Your account has been locked. Reason: {{reason}}."

  # --- DISPUTE EVENTS ---
  rentagf.dispute.report.created.v1:
    type: "TRANSACTIONAL"
    recipient_field: "accused_id"
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Bạn bị báo cáo ⚠️"
        body: "Bạn đã bị báo cáo vi phạm. Lý do: {{reason}}."
      en:
        title: "You Have Been Reported ⚠️"
        body: "You have been reported for a violation. Reason: {{reason}}."

  rentagf.dispute.resolved.v1:
    type: "TRANSACTIONAL"
    recipient_field: "_dynamic"  # Gửi cho cả client_id và companion_id
    priority: "HIGH"
    channels: ["SSE", "FCM"]
    template:
      vi:
        title: "Kết quả khiếu nại 📋"
        body: "Khiếu nại cho booking đã được giải quyết: {{resolution}}."
      en:
        title: "Dispute Resolved 📋"
        body: "The dispute for your booking has been resolved: {{resolution}}."
