syntax = "proto3";

package finance.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/finance;financev1";

import "google/protobuf/timestamp.proto";

message KanoCoinDeposited {
  string transaction_id = 1;
  string user_id = 2; // ID của User nhận thông báo nạp thành công
  int64 amount = 3; // Số lượng Kano-Coin
  google.protobuf.Timestamp occurred_at = 4;
}
