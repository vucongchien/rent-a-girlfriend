syntax = "proto3";

package finance.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/finance/events;financev1events";

import "google/protobuf/timestamp.proto";

message CoinsFrozen {
  string transaction_id = 1;
  string booking_id = 2;
  string user_id = 3;
  int64 amount = 4;
  google.protobuf.Timestamp occurred_at = 5;
}
