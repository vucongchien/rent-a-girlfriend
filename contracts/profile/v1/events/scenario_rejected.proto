syntax = "proto3";

package profile.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/profile;profilev1";

import "google/protobuf/timestamp.proto";

message ScenarioRejected {
  string scenario_id = 1;
  string companion_id = 2; // ID của Companion nhận thông báo từ chối
  string reason = 3; // Lý do từ chối
  google.protobuf.Timestamp occurred_at = 4;
}
