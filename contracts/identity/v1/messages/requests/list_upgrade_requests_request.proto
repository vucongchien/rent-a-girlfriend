syntax = "proto3";

package identity.v1;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

import "identity/v1/messages/responses/upgrade_status.proto";

// ListUpgradeRequestsRequest — lấy danh sách yêu cầu nâng cấp Companion (Admin only).
message ListUpgradeRequestsRequest {
  UpgradeStatus status    = 1; // optional filter: PENDING | APPROVED | REJECTED
  int32         page      = 2;
  int32         page_size = 3;
}
