syntax = "proto3";

package identity.v1;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

// TokenResponse — JWT access token + refresh token trả về sau đăng nhập hoặc refresh.
message TokenResponse {
  string access_token  = 1;
  string refresh_token = 2;
  int64  expires_in    = 3;
}
