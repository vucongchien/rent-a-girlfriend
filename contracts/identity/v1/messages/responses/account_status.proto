syntax = "proto3";

package identity.v1;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

// AccountStatus — trạng thái kích hoạt của tài khoản.
enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE      = 1;
  ACCOUNT_STATUS_LOCKED      = 2;
}
