syntax = "proto3";

package identity.v1.events;

option go_package = "github.com/rent-a-girlfriend/identity-service/internal/gen/proto;identityv1";

// AccountLockedPayload — payload của domain event AccountLocked.
// Phát ra khi Admin khóa tài khoản hoặc hệ thống tự động khóa do vi phạm.
// CloudEvent type: com.rentagf.identity.AccountLocked.v1
message AccountLockedPayload {
  string user_id = 1;
  string reason  = 2;
}
