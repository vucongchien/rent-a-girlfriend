syntax = "proto3";

package identity.v1.events;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

// UpgradeRejectedPayload — payload của domain event UpgradeRejected.
// Phát ra khi Admin từ chối yêu cầu nâng cấp.
// CloudEvent type: com.rentagf.identity.UpgradeRejected.v1
message UpgradeRejectedPayload {
  string user_id     = 1;
  string request_id  = 2;
  string rejected_by = 3; // Admin user ID
  string reason      = 4;
}
