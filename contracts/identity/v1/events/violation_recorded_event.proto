syntax = "proto3";

package identity.v1.events;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

// ViolationRecordedPayload — payload của domain event ViolationRecorded.
// Phát ra sau mỗi lần ghi nhận vi phạm (từ dispute-service hoặc admin).
// CloudEvent type: com.rentagf.identity.ViolationRecorded.v1
message ViolationRecordedPayload {
  string user_id       = 1;
  int32  current_count = 2; // Số lần vi phạm hiện tại sau khi ghi nhận
}
