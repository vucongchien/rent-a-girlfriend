syntax = "proto3";

package identity.v1.events;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

// UpgradeRequestedPayload — payload của domain event UpgradeRequested.
// Phát ra khi Client gửi yêu cầu nâng cấp thành Companion.
// CloudEvent type: com.rentagf.identity.UpgradeRequested.v1
message UpgradeRequestedPayload {
  string user_id    = 1;
  string request_id = 2;
  string reason     = 3;
}
